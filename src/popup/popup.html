<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
  <title>Clair</title>
</head>
<body>
  <div class="popup">
    <header class="header">
      <div class="header__brand">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" stroke="#C96442" stroke-width="2"/><path d="M8 12h8M12 8v8" stroke="#C96442" stroke-width="2" stroke-linecap="round"/></svg>
        <span class="header__name">Clair</span>
      </div>
      <span class="header__version" id="version"></span>
    </header>

    <div class="status" id="status">
      <div class="status__dot" id="status-dot"></div>
      <span id="status-text">Checking...</span>
    </div>

    <!-- Plan selector -->
    <section class="section">
      <h3 class="section__title">Your plan</h3>
      <div class="plan-selector" id="plan-selector">
        <button class="plan-opt" data-plan="pro">
          <span class="plan-opt__name">Pro</span>
          <span class="plan-opt__desc">~45 msgs/5h</span>
        </button>
        <button class="plan-opt" data-plan="max5x">
          <span class="plan-opt__name">Max 5×</span>
          <span class="plan-opt__desc">~225 msgs/5h</span>
        </button>
        <button class="plan-opt" data-plan="max20x">
          <span class="plan-opt__name">Max 20×</span>
          <span class="plan-opt__desc">~900 msgs/5h</span>
        </button>
      </div>
      <p class="plan-hint">Health advice adapts to your plan</p>
    </section>

    <!-- Export -->
    <section class="section">
      <h3 class="section__title">Export conversation</h3>
      <div class="actions">
        <button class="action" id="btn-export-md">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M8 2v9M4 7l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M2 13h12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          Markdown
        </button>
        <button class="action" id="btn-export-json">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M5 2v3c0 1.1-.9 2-2 2H2M11 2v3c0 1.1.9 2 2 2h1M5 14v-3c0-1.1-.9-2-2-2H2M11 14v-3c0-1.1.9-2 2-2h1" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
          JSON
        </button>
        <button class="action" id="btn-export-txt">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M3 3h10M3 6.5h7M3 10h10M3 13.5h5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
          Text
        </button>
      </div>
    </section>

    <!-- Compress -->
    <section class="section">
      <button class="compress-btn" id="btn-compress">
        <svg width="15" height="15" viewBox="0 0 16 16" fill="none"><path d="M4 6h8M4 10h8M6 2v4M10 2v4M6 10v4M10 10v4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
        Compress & Continue
      </button>
    </section>

    <!-- Shortcuts -->
    <section class="section section--shortcuts">
      <h3 class="section__title">Shortcuts</h3>
      <div class="shortcut"><kbd>Alt+E</kbd> Export</div>
      <div class="shortcut"><kbd>Alt+C</kbd> Compress</div>
      <div class="shortcut"><kbd>Alt+S</kbd> Sidebar</div>
      <div class="shortcut"><kbd>Alt+J/K</kbd> Navigate</div>
    </section>

    <footer class="footer">
      <a href="#" id="link-options">Settings</a>
      <span class="footer__sep">·</span>
      <a href="https://github.com/iljai0725" target="_blank" rel="noopener">GitHub</a>
    </footer>
  </div>
  <script src="popup.js"></script>
</body>
</html>
